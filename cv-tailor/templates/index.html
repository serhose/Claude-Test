<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV Tailor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 36px 20px 60px;
    }

    .wrapper { width: 100%; max-width: 720px; display: flex; flex-direction: column; gap: 16px; }

    .card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      padding: 32px 36px;
    }

    .app-header { text-align: center; margin-bottom: 28px; }
    .app-header h1 { font-size: 1.6rem; font-weight: 800; color: #111; letter-spacing: -0.5px; }
    .app-header p  { margin-top: 6px; font-size: 0.9rem; color: #777; }

    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 0.8rem; font-weight: 700; color: #444; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .field label span { font-weight: 400; color: #aaa; text-transform: none; letter-spacing: 0; }

    textarea {
      width: 100%; padding: 13px 15px; font-size: 0.9rem; font-family: inherit;
      border: 1.5px solid #e0e0e0; border-radius: 9px; resize: vertical;
      transition: border-color 0.2s; color: #222; line-height: 1.55; background: #fafafa;
    }
    textarea:focus { outline: none; border-color: #4f46e5; background: #fff; }
    textarea::placeholder { color: #bbb; }
    #jd { height: 220px; }
    #notes { height: 80px; }

    .btn-generate {
      width: 100%; padding: 14px; background: #4f46e5; color: #fff;
      border: none; border-radius: 9px; font-size: 1rem; font-weight: 700;
      cursor: pointer; transition: background 0.2s, transform 0.1s, opacity 0.2s;
    }
    .btn-generate:hover:not(:disabled) { background: #4338ca; }
    .btn-generate:active:not(:disabled) { transform: scale(0.99); }
    .btn-generate:disabled { opacity: 0.55; cursor: not-allowed; }

    .loading-row { display: none; align-items: center; gap: 10px; margin-top: 14px; font-size: 0.88rem; color: #4f46e5; }
    .loading-row.visible { display: flex; }
    .spinner { width: 16px; height: 16px; flex-shrink: 0; border: 2px solid #c7d2fe; border-top-color: #4f46e5; border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { margin-top: 12px; padding: 11px 14px; background: #fef2f2; border-left: 3px solid #ef4444; border-radius: 6px; font-size: 0.85rem; color: #b91c1c; display: none; }
    .error-msg.visible { display: block; }

    /* Results */
    #resultsPanel { display: none; }
    #resultsPanel.visible { display: block; }
    .divider { height: 1px; background: #f0f0f0; margin: 20px 0 18px; }
    .results-header { display: flex; align-items: center; justify-content: space-between; }
    .results-header h2 { font-size: 1rem; font-weight: 700; color: #111; }
    .dl-btn { padding: 8px 16px; background: #4f46e5; color: #fff; border: none; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .dl-btn:hover { background: #4338ca; }

    .dl-btn-sm { padding: 6px 12px; background: #eef2ff; color: #4338ca; border: none; border-radius: 6px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .dl-btn-sm:hover { background: #e0e7ff; }

    /* ── Chat ── */
    #chatCard { display: none; }
    #chatCard.visible { display: block; }
    .chat-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .chat-header h2 { font-size: 1rem; font-weight: 700; color: #111; }
    .messages { border: 1.5px solid #eee; border-radius: 10px; padding: 14px; height: 260px; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 85%; padding: 10px 13px; border-radius: 10px; font-size: 0.87rem; line-height: 1.5; word-break: break-word; }
    .msg.user      { align-self: flex-end; background: #4f46e5; color: #fff; border-bottom-right-radius: 3px; }
    .msg.assistant { align-self: flex-start; background: #fff; color: #222; border: 1.5px solid #eee; border-bottom-left-radius: 3px; }
    .msg.assistant.with-dl { display: flex; flex-direction: column; gap: 8px; }
    .msg-dl-btn { align-self: flex-start; font-size: 0.78rem; font-weight: 600; color: #4f46e5; background: #eef2ff; border: none; border-radius: 5px; padding: 4px 10px; cursor: pointer; }
    .msg-dl-btn:hover { background: #e0e7ff; }
    .chat-input-row { display: flex; gap: 10px; margin-top: 12px; }
    #chatInput { flex: 1; padding: 11px 14px; font-size: 0.88rem; font-family: inherit; border: 1.5px solid #e0e0e0; border-radius: 9px; resize: none; background: #fafafa; transition: border-color 0.2s; color: #222; }
    #chatInput:focus { outline: none; border-color: #4f46e5; background: #fff; }
    #chatInput::placeholder { color: #bbb; }
    #sendBtn { padding: 11px 20px; background: #4f46e5; color: #fff; border: none; border-radius: 9px; font-size: 0.88rem; font-weight: 700; cursor: pointer; transition: background 0.2s, opacity 0.2s; white-space: nowrap; }
    #sendBtn:hover:not(:disabled) { background: #4338ca; }
    #sendBtn:disabled { opacity: 0.55; cursor: not-allowed; }
    .chat-hint { margin-top: 10px; font-size: 0.78rem; color: #bbb; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- ── Main Card ── -->
  <div class="card">
    <div class="app-header">
      <h1>CV Tailor</h1>
      <p>Synthesizes the best content from all 27 resume versions and tailors it to your job description.</p>
    </div>

    <form id="cvForm">
      <div class="field">
        <label for="jd">Job Description</label>
        <textarea id="jd" name="job_description" placeholder="Paste the full job description here — title, responsibilities, requirements..." required></textarea>
      </div>
      <div class="field">
        <label for="notes">Notes <span>(optional)</span></label>
        <textarea id="notes" name="user_notes" placeholder="e.g. emphasize data skills, target senior-level tone, focus on research experience..."></textarea>
      </div>
      <button type="submit" class="btn-generate" id="submitBtn">Generate Tailored CV</button>
    </form>

    <div class="loading-row" id="loadingRow">
      <div class="spinner"></div>
      <span id="loadingMsg">Scanning all 27 resumes...</span>
    </div>
    <div class="error-msg" id="errorMsg"></div>

    <!-- Results panel -->
    <div id="resultsPanel">
      <div class="divider"></div>
      <div class="results-header">
        <h2>Your CV is ready</h2>
        <button class="dl-btn" onclick="downloadLatest()">Download .docx</button>
      </div>
    </div>
  </div>

  <!-- ── Chat Card ── -->
  <div class="card" id="chatCard">
    <div class="chat-header">
      <h2>Refine your CV</h2>
      <button class="dl-btn-sm" onclick="downloadLatest()">Download latest</button>
    </div>
    <div class="messages" id="messages"></div>
    <div class="chat-input-row">
      <textarea id="chatInput" rows="2" placeholder="Ask for any changes — shorter, focus on data skills, remove a section..."></textarea>
      <button id="sendBtn" onclick="sendRefinement()">Send</button>
    </div>
    <p class="chat-hint">Each message refines the same CV. Every updated version can be downloaded.</p>
  </div>

</div>

<script>
  const form         = document.getElementById("cvForm");
  const submitBtn    = document.getElementById("submitBtn");
  const loadingRow   = document.getElementById("loadingRow");
  const loadingMsg   = document.getElementById("loadingMsg");
  const errorMsg     = document.getElementById("errorMsg");
  const resultsPanel = document.getElementById("resultsPanel");
  const chatCard     = document.getElementById("chatCard");
  const messagesEl   = document.getElementById("messages");
  const chatInput    = document.getElementById("chatInput");
  const sendBtn      = document.getElementById("sendBtn");

  const loadingSteps = [
    "Scanning all 27 resumes...",
    "Analyzing job requirements...",
    "Synthesizing best content...",
    "Almost done..."
  ];
  let loadingTimer = null;

  function startLoadingAnimation() {
    let i = 0;
    loadingMsg.textContent = loadingSteps[0];
    loadingTimer = setInterval(() => { i = Math.min(i + 1, loadingSteps.length - 1); loadingMsg.textContent = loadingSteps[i]; }, 8000);
  }
  function stopLoadingAnimation() { clearInterval(loadingTimer); }

  // ── Generate ──────────────────────────────────────────────────────────

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const jd = document.getElementById("jd").value.trim();
    if (!jd) return;

    submitBtn.disabled = true;
    errorMsg.classList.remove("visible");
    resultsPanel.classList.remove("visible");
    chatCard.classList.remove("visible");
    loadingRow.classList.add("visible");
    startLoadingAnimation();

    try {
      const formData = new FormData(form);
      const response = await fetch("/generate", { method: "POST", body: formData });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || "Something went wrong.");

      await downloadLatest();
      resultsPanel.classList.add("visible");

      chatCard.classList.add("visible");
      messagesEl.innerHTML = "";
      appendMessage("assistant", "Your CV is ready! Use the chat to refine it further — I can shorten sections, shift focus, or adjust the tone.");
      setTimeout(() => chatCard.scrollIntoView({ behavior: "smooth", block: "nearest" }), 500);

    } catch (err) {
      errorMsg.textContent = "Error: " + err.message;
      errorMsg.classList.add("visible");
    } finally {
      submitBtn.disabled = false;
      loadingRow.classList.remove("visible");
      stopLoadingAnimation();
    }
  });

  // ── Refine ────────────────────────────────────────────────────────────

  async function sendRefinement() {
    const message = chatInput.value.trim();
    if (!message) return;

    appendMessage("user", message);
    chatInput.value = "";
    sendBtn.disabled = true;
    chatInput.disabled = true;

    const thinkingEl = appendMessage("assistant", '<span class="spinner" style="display:inline-block;width:13px;height:13px;border:2px solid #c7d2fe;border-top-color:#4f46e5;border-radius:50%;animation:spin 0.75s linear infinite;vertical-align:middle;margin-right:6px;"></span> Updating your CV...');

    try {
      const r = await fetch("/refine", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ message }) });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || "Something went wrong.");

      thinkingEl.innerHTML = "";
      thinkingEl.classList.add("with-dl");
      thinkingEl.appendChild(document.createTextNode(data.reply));
      const dlBtn = document.createElement("button");
      dlBtn.className = "msg-dl-btn";
      dlBtn.textContent = "Download this version";
      dlBtn.onclick = downloadLatest;
      thinkingEl.appendChild(dlBtn);

    } catch (err) {
      thinkingEl.textContent = "Error: " + err.message;
      thinkingEl.style.color = "#dc2626";
    } finally {
      sendBtn.disabled = false;
      chatInput.disabled = false;
      chatInput.focus();
    }
  }

  chatInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendRefinement(); }
  });

  // ── Helpers ───────────────────────────────────────────────────────────

  function appendMessage(role, html) {
    const el = document.createElement("div");
    el.className = "msg " + role;
    el.innerHTML = html;
    messagesEl.appendChild(el);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return el;
  }

  async function downloadLatest() {
    const r = await fetch("/download");
    if (!r.ok) return;
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "Melda_Akan_CV.docx";
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
  }
</script>
</body>
</html>
